<body>

<h1>🐍 Snake</h1>
<div id="score">Punkte: 0</div>
<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gridSize = 20;
const tileCount = canvas.width / gridSize;

let snake = [
    { x: 10, y: 10 }
];

let food = {
    x: 5,
    y: 5
};

let dx = 0;
let dy = 0;
let score = 0;

function randomFood() {
    food.x = Math.floor(Math.random() * tileCount);
    food.y = Math.floor(Math.random() * tileCount);
}

document.addEventListener("keydown", e => {
    switch (e.key) {
        case "ArrowUp":
            if (dy === 0) {
                dx = 0;
                dy = -1;
            }
            break;

        case "ArrowDown":
            if (dy === 0) {
                dx = 0;
                dy = 1;
            }
            break;

        case "ArrowLeft":
            if (dx === 0) {
                dx = -1;
                dy = 0;
            }
            break;

        case "ArrowRight":
            if (dx === 0) {
                dx = 1;
                dy = 0;
            }
            break;
    }
});

function gameLoop() {
    const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
    };

    // Wandkollision
    if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tileCount ||
        head.y >= tileCount
    ) {
        gameOver();
        return;
    }

    // Selbstkollision
    for (let part of snake) {
        if (part.x === head.x && part.y === head.y) {
            gameOver();
            return;
        }
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById("score").textContent =
            "Punkte: " + score;
        randomFood();
    } else {
        snake.pop();
    }

    draw();
}

function draw() {
    ctx.fillStyle = "#222";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Essen
    ctx.fillStyle = "red";
    ctx.fillRect(
        food.x * gridSize,
        food.y * gridSize,
        gridSize,
        gridSize
    );

    // Schlange
    ctx.fillStyle = "lime";
    snake.forEach(part => {
        ctx.fillRect(
            part.x * gridSize,
            part.y * gridSize,
            gridSize,
            gridSize
        );
    });
}

function gameOver() {
    alert("Game Over! Punkte: " + score);
    location.reload();
}

randomFood();
draw();

setInterval(gameLoop, 120);
</script>

</body>
</html>
