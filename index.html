<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallo Welt</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div id="output"></div>

    <script>
        const output = document.getElementById("output");

        // Zufällige Position zwischen 0 und 99
        const randomPosition = Math.floor(Math.random() * 100);

        let text = "";

        for (let i = 0; i < 100; i++) {
            if (i === randomPosition) {
                text += "halo Welt<br>";
            } else {
                text += "Hallo Welt<br>";
            }
        }

        output.innerHTML = text;
    </script>
</body>
</html>
