    <div id="output"></div>

    <script>
        const output = document.getElementById("output");

        // Zufällige Position zwischen 0 und 99
        const randomPosition = Math.floor(Math.random() * 100);

        let text = "";

        for (let i = 0; i < 100; i++) {
            if (i === randomPosition) {
                text += "halo Welt<br>";
            } else {
                text += "Hallo Welt<br>";
            }
        }

        output.innerHTML = text;
